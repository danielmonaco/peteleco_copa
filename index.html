<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Peteleco da Copa</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1f12;
        --panel: #10271a;
        --ink: #ffffff;
        --muted: rgba(255, 255, 255, 0.72);
        --line: rgba(255, 255, 255, 0.16);
        --accent: #ffd83d;
        --accent-ink: #10240f;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 18px; /* corpo >= 18px (FLOW-05) */
        color: var(--ink);
        touch-action: none;
      }
      #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
      #game { width: 100%; height: 100%; display: block; touch-action: none; }

      /* Overlays DOM das telas de fluxo */
      #ui-root { position: fixed; inset: 0; z-index: 10; }
      .screen {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        background: linear-gradient(180deg, rgba(7,18,11,0.96), rgba(7,18,11,0.92));
        padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
        gap: 16px;
      }
      .screen[hidden] { display: none; }

      .title { font-size: 2rem; font-weight: 800; text-align: center; margin: 8px 0 0; }
      .subtitle { font-size: 1rem; color: var(--muted); text-align: center; margin: 0; }
      .spacer { flex: 1 1 auto; }

      .btn {
        min-height: 56px; padding: 0 22px;
        font-size: 1.15rem; font-weight: 700;
        border-radius: 14px; border: 2px solid var(--line);
        background: rgba(255,255,255,0.1); color: var(--ink);
        cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      }
      .btn:active { transform: translateY(1px); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
      .btn-row { display: flex; gap: 12px; }
      .btn-row .btn { flex: 1; }

      /* Seleção de times */
      .sides { display: flex; flex-direction: column; gap: 10px; overflow: hidden; flex: 1 1 auto; }
      .side { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 10px; display: flex; flex-direction: column; min-height: 0; flex: 1; }
      .side > h2 { margin: 0 0 8px; font-size: 1.05rem; }
      .side .chosen { color: var(--muted); font-weight: 700; }
      .grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 8px; overflow-y: auto; padding: 4px; -webkit-overflow-scrolling: touch;
      }
      .team-card {
        min-height: 64px; border-radius: 12px; border: 2px solid var(--line);
        background: rgba(255,255,255,0.06); color: var(--ink);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 2px; cursor: pointer; padding: 6px 4px;
      }
      .team-card .flag { font-size: 1.5rem; line-height: 1; }
      .team-card .code { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.5px; }
      .team-card .name { font-size: 0.72rem; color: var(--muted); text-align: center; }
      .team-card .swatch { width: 22px; height: 6px; border-radius: 3px; margin-top: 2px; }
      .team-card.selected { border-color: var(--accent); background: rgba(255,216,61,0.18); }

      /* Config (controles segmentados) */
      .config-list { display: flex; flex-direction: column; gap: 18px; max-width: 520px; width: 100%; margin: 0 auto; }
      .field > label { display: block; font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
      .seg { display: flex; gap: 8px; }
      .seg button {
        flex: 1; min-height: 56px; font-size: 1.1rem; font-weight: 700;
        border-radius: 12px; border: 2px solid var(--line);
        background: rgba(255,255,255,0.08); color: var(--ink); cursor: pointer;
      }
      .seg button[aria-pressed='true'] { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

      /* Fim de jogo */
      .over-card { text-align: center; display: flex; flex-direction: column; gap: 10px; align-items: center; }
      .over-winner { font-size: 1.6rem; font-weight: 800; }
      .over-score { font-size: 2.4rem; font-weight: 800; }

      .center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; flex: 1; }
      .actions { display: flex; flex-direction: column; gap: 12px; max-width: 520px; width: 100%; margin: 0 auto; }
    </style>
  </head>
  <body>
    <div id="stage"><canvas id="game"></canvas></div>
    <div id="ui-root"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
